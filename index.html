<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Audio Challenge</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Listen Carefully <br> (you may need to enable audio on your browser, typically near the URL)</h1>

  <audio id="audioPlayer" autoplay loop>
    <source src="assets/audio/do-the-roar-11.mp3" type="audio/mpeg">
  </audio>

  <p>Enter the answer:</p>

  <input
          id="answerInput"
          type="text"
          autocomplete="off">

  <button onclick="checkAnswer()">
    Submit
  </button>

  <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
